# Static pipeline configuration for the MQTT `sol` demo project.
# Paths assume the archive from `example/sol.tar.gz` is unpacked at `/workspace/project/sol`.

[wpa]
path = "/workspace/project/sol/build/ffp.txt"

[database]
path = "/workspace/project/sol/build"

[llm]
llm_api_platform = "http://10.102.32.6:47860/v1/chat/completions"
llm_model_deepseek_v3 = "deepseek-v3"
llm_model_deepseek_r1 = "deepseek-r1"
llm_query_repeat_times = 1
llm_query_max_attempts = 10
llm_violation_repeat_times = 3
llm_multithread = 32

[project]
project_path = "/workspace/project/sol"
packet_related_callgraph_path = "/workspace/project/sol/build/callgraph_report.txt"
function_arg_path = "/workspace/project/sol/build/function_arg_summary.txt"
rule_path = "/workspace/inputs/rules.json"
protocol_name = "mqtt"
protocol_version = "3.1.1"
project_name = "Sol"
original_llvm_ir_path = "/workspace/project/sol/build/sol.bc"

build_command = "cmake -S . -B build -DCMAKE_C_COMPILER=gclang -DCMAKE_C_FLAGS='-g -Xclang -disable-O0-optnone -fno-discard-value-names' && cmake --build build -- VERBOSE=1"
build_log_path = "/workspace/project/sol/build/build_log.txt"
binary_path = "/workspace/project/sol/build/sol"
bitcode_path = "/workspace/project/sol/build/sol.bc"

[debug]
code_slice_replace_mode = 0
log_print = 0

[config]
mqtt_packet_type = [
    "CONNECT",
    "CONNACK",
    "PUBLISH",
    "PUBACK",
    "PUBREC",
    "PUBREL",
    "PUBCOMP",
    "SUBSCRIBE",
    "SUBACK",
    "UNSUBSCRIBE",
    "UNSUBACK",
    "PINGREQ",
    "PINGRESP",
    "DISCONNECT",
    "AUTH"
]

dhcpv6_packet_type = [
    "DHCP6_SOLICIT",
    "DHCP6_ADVERTISE",
    "DHCP6_REQUEST",
    "DHCP6_REPLY",
    "DHCP6_CONFIRM",
    "DHCP6_RELEASE",
    "DHCP6_DECLINE",
    "DHCP6_RENEW",
    "DHCP6_REBIND",
    "DHCP6_IREQ",
    "DHCP6_RECONFIGURE",
    "DHCP6_RELAYFORW",
    "DHCP6_RELAYREPL"
]

coap_packet_type = [
    "CONFIRMABLE",
    "NON_CONFIRMABLE",
    "ACKNOWLEDGEMENT",
    "RESET"
]

ftp_packet_type = [
    "USER",
    "PASS",
    "ACCT",
    "REIN",
    "QUIT",
    "PORT",
    "PASV",
    "TYPE",
    "STRU",
    "MODE",
    "RETR",
    "STOR",
    "APPE",
    "DELE",
    "RNFR",
    "RNTO",
    "ABOR",
    "CWD",
    "CDUP",
    "PWD",
    "MKD",
    "RMD",
    "LIST",
    "NLST",
    "SYST",
    "STAT",
    "FEAT",
    "HELP",
    "NOOP",
    "ALLO",
    "REST",
    "MLST",
    "MLSD",
    "OPTS",
