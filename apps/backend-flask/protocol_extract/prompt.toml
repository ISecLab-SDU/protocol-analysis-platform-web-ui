[prompt_second_rule]
user = """
You are provided with a set of descriptions extracted from the {protocol} {version} protocol specification:
{sentence}

Your task is to analyze the meaning of each rule in these descriptions and determine whether it falls within our scope of interest.

Follow this analysis process step-by-step for each rule:
(1)The rule describes a specific {protocol} {version} protocol message type or its internal fields, and this message type can be sent or received by an implementation of the protocol.
(2)The rule explicitly describes or implies, through field value ranges, format definitions, or construction/processing procedures, the logic that the protocol program should apply when generating (sending) or processing (receiving) such a message.
This logic must be detailed enough to directly guide a developer’s implementation.
(3)The described message logic pertains to handling a single message instance — including atomic or transactional operations for constructing or validating its variable bindings or fields — or verifying their consistency against previous messages in the same protocol exchange.

For each rule:

1.If all three criteria (1), (2), and (3) are satisfied, respond with "Conforms."
2.If any criterion is not met, respond with "Does not conform."

Please omit all explanatory content.
"""

[prompt_enhance_rule]
user = """
You are given a sentence or short text fragment from the {protocol} {version} specification.

Context: it appears under the section "{heading}".
Text: {sentence}

Your task is to rewrite and enhance this text so that:
1. All implicit references (such as "it", "they", "this", "that") are resolved into explicit protocol entities where possible.
2. Any necessary contextual information is folded in, so that the enhanced text can be understood correctly even when read in isolation.
3. The meaning of the original text is preserved — do not add new requirements or behavior that are not implied by the original.
4. The enhanced text remains concise, technically accurate, and faithful to the original intent.
5. If the sentence or short text fragment references or depends on any table, figure, or diagram from the specification, restate the relevant information from that table or figure in natural language and integrate it into the enhanced text. Only include the portions that are necessary for correct standalone understanding. Do not add new interpretation beyond what the figure or table conveys.

Format your response as:
[your enhanced version here]
"""

[prompt_third_rule]
user = """
Given a rule description extracted from the {protocol} {version} specification and the subheading in which it is located:
{heading}
{sentence}

Your task is to extract the official message types and fields involved in this rule according to the protocol specification. Follow these rules:

1. Identify the **request message type (req_type)** exactly as defined in the protocol specification. If the rule does not involve a request, use an empty string.
2. Extract the **fields involved in the request message (req_fields)** using the official field names as specified by the protocol. Do not invent or infer fields not in the spec.
3. Identify the **response message type (res_type)** exactly as defined in the protocol specification. If the rule does not involve a response, use an empty string.
4. Extract the **fields involved in the response message (res_fields)** using the official field names as specified in the protocol. If no fields are mentioned or no response exists, use an empty array.
5. If the rule refers to multiple request or response types, list them all in the respective array.
6. Avoid making assumptions beyond what the specification states. Only include what is explicitly defined in the official protocol documents.

Present the results strictly in the following JSON format:

```json
{{
    "rule": "{sentence}",
    "req_type": "",
    "req_fields": [],
    "res_type": "",
    "res_fields": []
}}
"""
