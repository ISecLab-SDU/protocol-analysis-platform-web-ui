# ==============================================================================
# ProtocolGuard Easy-Upload 项目更改记录
# ==============================================================================
#
# 与原项目 (protocol-analysis-platform-web-ui-main) 的差异：
#
# 一、新增文件
# ------------------------------------------------------------------------------
# 1. compiler.py - 自动生成 Dockerfile，替代手动配置
#    - 根据 sol.tar、config.toml、rule_config.json 生成 Dockerfile
#    - 验证 .cf_*.json 文件存在
#    - 动态生成 config.toml 路径配置
#    - 重新解压 sol.tar 确保源代码完整
#
# 2. .envrc - 环境变量配置文件
#    - 存储 ANTHROPIC_API_KEY, ANTHROPIC_BASE_URL
#    - 存储 OPENAI_API_KEY, OPENAI_BASE_URL
#    - 存储 PG_AGENT_MODEL
#
# 二、修改文件
# ------------------------------------------------------------------------------
# 1. app.py - 应用入口
#    - 添加 _load_envrc() 函数，自动加载 .envrc 文件
#
# 2. assertion.py - 断言生成与插桩
#    - 添加 _docker_settings() 函数
#    - 添加 _container_host_identity_env() 函数
#    - 修改参数名 code_filename → code_file_name
#    - 修改环境变量检查逻辑：检查至少一个 LLM 提供商可用
#
# 3. routes.py - API 路由
#    - 修改 RTSP_CONFIG 的 Docker 挂载路径
#      原路径: /home/lab426_system/ProtocolGuardOutPut
#      新路径: /home/wenhao/protocol-analysis-platform-easy-upload/fuzz-output
#    - 添加自动创建 fuzz-output 目录的逻辑
#
# 三、核心功能变更
# ------------------------------------------------------------------------------
# 1. 上传流程简化
#    - 原项目：需要上传 sol.tar + Dockerfile + config.toml + rules.json
#    - 更改项目：只需上传 sol.tar + config.toml + rule_config.json
#    - Dockerfile 由 compiler.py 自动生成
#
# 2. 环境变量管理
#    - 原项目：环境变量需要在服务器上手动 export
#    - 更改项目：环境变量存储在 .envrc 文件中，自动加载
#
# 3. 模糊测试路径
#    - 原项目：使用硬编码的实验室路径
#    - 更改项目：使用项目目录下的 fuzz-output 目录
#
# ==============================================================================
# tmux 配置
# ==============================================================================
set -g mouse on
set -g history-limit 10000
set -g default-terminal "screen-256color"
set -g status-bg '#1a1a2e'
set -g status-fg '#c0c0c0'
set -g status-left-length 30
set -g status-right-length 100
set -g status-left '#[bg=#16213e,fg=#0f3460] #S #[bg=#0f3460,fg=#e94560] ❯'
set -g status-right '#[bg=#16213e,fg=#0f3460] ❮ #[fg=#c0c0c0]%d %b %Y #[fg=#e94560]%H:%M:%S'
set -g pane-border-bg '#1a1a2e'
set -g pane-border-fg '#0f3460'
set -g pane-active-border-bg '#1a1a2e'
set -g pane-active-border-fg '#e94560'
set -g window-status-bg '#1a1a2e'
set -g window-status-fg '#0f3460'
set -g window-status-current-bg '#16213e'
set -g window-status-current-fg '#e94560'
bind-key -r C-h select-pane -L
bind-key -r C-j select-pane -D
bind-key -r C-k select-pane -U
bind-key -r C-l select-pane -R
bind-key -r C-\ split-window -h
bind-key -r C-| split-window -v
bind-key -r C-x kill-pane
bind-key -r C-c new-window
bind-key -r C-n next-window
bind-key -r C-p previous-window
bind-key -r C-w kill-window
bind-key -r C-r source-file ~/.tmux.conf
bind-key -r C-z resize-pane -Z
bind-key -r C-a send-prefix
unbind-key C-b
set -g prefix C-a